<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理 - 内容创作者助手</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .accounts-container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
        .page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .account-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .account-card {
            background: var(--card-bg, #1e1e2e);
            border: 1px solid var(--border-color, #333);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .account-info h4 { margin: 0 0 4px; font-size: 1rem; }
        .account-info small { color: #888; font-size: 0.78rem; }
        .account-mode { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .account-mode.local { background: #1a3a2a; color: #4caf8a; }
        .account-mode.cloud { background: #1a2a3a; color: #4a9eff; }
        .btn-delete { background: none; border: 1px solid #c0392b; color: #e74c3c; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; }
        .btn-delete:hover { background: #c0392b22; }
        .btn-add { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-add:hover { opacity: 0.9; }
        .empty-state { color: #888; text-align: center; padding: 32px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--card-bg, #1e1e2e); border: 1px solid var(--border-color, #333); border-radius: 14px; padding: 28px; width: 100%; max-width: 480px; }
        .modal-box h3 { margin: 0 0 20px; font-size: 1.1rem; }
        .form-field { margin-bottom: 16px; }
        .form-field label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #aaa; }
        .form-field input { width: 100%; box-sizing: border-box; padding: 9px 12px; border-radius: 7px; border: 1px solid #444; background: #121222; color: #eee; font-size: 0.9rem; }
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-tab { flex: 1; padding: 8px; border: 1px solid #444; border-radius: 7px; background: none; color: #888; cursor: pointer; font-size: 0.85rem; }
        .mode-tab.active { border-color: #667eea; color: #fff; background: #1a1a3a; }
        .qr-section { text-align: center; }
        .qr-section img { max-width: 280px; border-radius: 8px; margin-bottom: 12px; }
        .qr-status { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
        .qr-status.success { color: #4caf8a; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-cancel { background: none; border: 1px solid #555; color: #aaa; border-radius: 7px; padding: 8px 18px; cursor: pointer; }
        .btn-confirm { background: #667eea; color: #fff; border: none; border-radius: 7px; padding: 8px 18px; cursor: pointer; }
        .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-get-qr { background: #27ae60; color: #fff; border: none; border-radius: 7px; padding: 8px 16px; cursor: pointer; margin-bottom: 12px; }
        .status-bar { padding: 10px 14px; border-radius: 7px; font-size: 0.85rem; margin-bottom: 12px; display: none; }
        .status-bar.error { background: #2a1010; color: #e74c3c; display: block; }
        .status-bar.success { background: #102a10; color: #4caf8a; display: block; }
    </style>
</head>
<body>
<div class="container">
    <header class="navbar">
        <h1 class="logo"><i class="fas fa-pencil-alt"></i> 内容创作者助手</h1>
        <button class="btn btn-back" id="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</button>
    </header>

    <div class="accounts-container">
        <div class="page-title"><i class="fas fa-user-circle"></i> 账号管理</div>

        <div class="status-bar" id="status-bar"></div>

        <div class="account-list" id="account-list">
            <div class="empty-state">加载中…</div>
        </div>

        <button class="btn-add" id="add-btn"><i class="fas fa-plus"></i> 添加账号</button>
    </div>
</div>

<!-- Add account modal -->
<div class="modal-overlay" id="add-modal">
    <div class="modal-box">
        <h3><i class="fas fa-user-plus"></i> 添加小红书账号</h3>

        <div class="form-field">
            <label>账号名称</label>
            <input type="text" id="modal-name" placeholder="例：安吉美甲官号">
        </div>

        <div class="mode-tabs">
            <button class="mode-tab active" id="tab-local" data-mode="local">本地模式</button>
            <button class="mode-tab" id="tab-cloud" data-mode="cloud">云端扫码</button>
        </div>

        <!-- Local mode fields -->
        <div id="local-fields">
            <div class="form-field">
                <label>Chrome Profile 目录</label>
                <input type="text" id="modal-profile-dir" placeholder="留空则使用默认目录">
            </div>
            <p style="font-size:0.78rem;color:#888;margin:0 0 8px">
                每个账号对应一个独立的 Chrome 用户数据目录（已在该 Chrome 中登录小红书）。
            </p>
        </div>

        <!-- Cloud QR fields -->
        <div id="cloud-fields" style="display:none">
            <div class="qr-section" id="qr-section">
                <p style="font-size:0.85rem;color:#aaa;margin:0 0 12px">点击"获取二维码"后，用手机小红书 App 扫描。</p>
                <button class="btn-get-qr" id="get-qr-btn"><i class="fas fa-qrcode"></i> 获取二维码</button>
                <div id="qr-image-wrap" style="display:none">
                    <img id="qr-img" src="" alt="二维码">
                    <div class="qr-status" id="qr-status">等待扫码…</div>
                    <button class="btn-get-qr" id="refresh-qr-btn" style="display:none">刷新二维码</button>
                </div>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" id="modal-cancel">取消</button>
            <button class="btn-confirm" id="modal-confirm">保存</button>
        </div>
    </div>
</div>

<script src="../js/accounts-page.js"></script>
</body>
</html>
