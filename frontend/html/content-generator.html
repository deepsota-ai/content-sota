<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容创作者助手 - 内容生成页</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/content-generator.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="navbar">
            <h1 class="logo">
                <i class="fas fa-pencil-alt"></i>
                内容创作者助手 - 内容生成
            </h1>
            <button class="btn btn-back" id="back-btn">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
        </header>

        <!-- 内容生成页面主体 -->
        <main class="content-generator">
            <!-- 模式按钮区 -->
            <section class="content-functions">
                <div class="function-buttons">
                    <button class="btn function-btn" id="single-btn">
                        <i class="fas fa-feather-alt"></i>
                        <span>单篇创作</span>
                    </button>
                    <button class="btn function-btn" id="batch-btn">
                        <i class="fas fa-layer-group"></i>
                        <span>批量处理</span>
                    </button>
                </div>
            </section>

            <!-- 批量处理子按钮（默认隐藏） -->
            <section class="content-functions" id="batch-sub-section" style="display:none;">
                <div class="function-buttons">
                    <button class="btn function-btn batch-sub-btn" id="optimize-btn">
                        <i class="fas fa-pen-nib"></i>
                        <span>优化文案</span>
                    </button>
                    <button class="btn function-btn batch-sub-btn" id="hook-btn">
                        <i class="fas fa-play-circle"></i>
                        <span>生成钩子</span>
                    </button>
                    <button class="btn function-btn batch-sub-btn" id="title-btn">
                        <i class="fas fa-heading"></i>
                        <span>生成标题</span>
                    </button>
                </div>
            </section>

            <!-- 功能说明区 -->
            <section class="content-description">
                <div class="description-card">
                    <h2><i class="fas fa-info-circle"></i> 内容生成功能说明</h2>
                    <div class="description-content">
                        <p>选择创作模式：</p>
                        <ul>
                            <li><strong>单篇创作</strong>：一句话描述需求，向导式完成草稿→标题→钩子→封面→保存全流程</li>
                            <li><strong>批量处理</strong>：基于 material.txt 素材，分步批量生成优化文案、钩子和标题</li>
                        </ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('back-btn');
            const singleBtn = document.getElementById('single-btn');
            const batchBtn = document.getElementById('batch-btn');
            const batchSubSection = document.getElementById('batch-sub-section');

            backBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            singleBtn.addEventListener('click', () => {
                window.location.href = 'subpages/single-post.html';
            });

            batchBtn.addEventListener('click', () => {
                const isVisible = batchSubSection.style.display !== 'none';
                batchSubSection.style.display = isVisible ? 'none' : 'flex';
                batchBtn.classList.toggle('active', !isVisible);
            });

            document.getElementById('optimize-btn').addEventListener('click', () => {
                window.location.href = 'subpages/content-subpage.html';
            });
            document.getElementById('title-btn').addEventListener('click', () => {
                window.location.href = 'subpages/title-subpage.html';
            });
            document.getElementById('hook-btn').addEventListener('click', () => {
                window.location.href = 'subpages/hook-subpage.html';
            });
        });
    </script>
</body>
</html>
