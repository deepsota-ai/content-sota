<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布完善 - 内容创作者助手</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/publish-page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .account-bar {
            display: flex; align-items: center; gap: 10px;
            background: var(--card-bg, #1e1e2e);
            border: 1px solid var(--border-color, #333);
            border-radius: 8px; padding: 10px 16px; margin-bottom: 16px;
        }
        .account-bar label { font-size: 0.85rem; color: #aaa; white-space: nowrap; }
        .account-bar select {
            flex: 1; background: #121222; color: #eee; border: 1px solid #444;
            border-radius: 6px; padding: 6px 10px; font-size: 0.9rem;
        }
        .account-bar a { font-size: 0.8rem; color: #667eea; text-decoration: none; white-space: nowrap; }
        .account-bar a:hover { text-decoration: underline; }
        .publish-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff4; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="navbar">
            <h1 class="logo">
                <i class="fas fa-pencil-alt"></i>
                内容创作者助手
            </h1>
            <button class="btn btn-back" id="back-btn">
                <i class="fas fa-arrow-left"></i>
                返回首页
            </button>
        </header>

        <main class="publish-container">
            <h2 class="page-title">
                <i class="fas fa-paper-plane"></i>
                发布完善
            </h2>

            <!-- Account selector -->
            <div class="account-bar" id="account-bar">
                <label><i class="fas fa-user-circle"></i> 发布账号</label>
                <select id="account-select">
                    <option value="">— 默认账号 —</option>
                </select>
                <a href="accounts-page.html"><i class="fas fa-cog"></i> 管理账号</a>
            </div>

            <div class="status-message info" id="info-message">
                <i class="fas fa-info-circle"></i>
                <span>请从以下列表中选择要发布的内容文件夹</span>
            </div>

            <div class="status-message" id="status-message"></div>

            <div class="folder-list" id="folder-list">
                <!-- 文件夹列表将通过JavaScript动态生成 -->
            </div>

            <!-- 内容预览编辑面板（选中素材后显示） -->
            <div class="content-edit-panel" id="content-edit-panel" style="display:none;">
                <div class="content-edit-header">
                    <h3><i class="fas fa-edit"></i> 发布前预览 / 微调</h3>
                    <span class="save-toast" id="save-toast">已保存 ✓</span>
                </div>
                <div class="content-edit-field">
                    <label>标题</label>
                    <input type="text" id="edit-title" placeholder="标题…" maxlength="100">
                </div>
                <div class="content-edit-field">
                    <label>正文（钩子 + 内容 + 标签）</label>
                    <textarea id="edit-desc" rows="8" placeholder="正文内容…"></textarea>
                </div>
                <div class="content-edit-actions">
                    <button class="btn btn-save-edit" id="save-edit-btn">
                        <i class="fas fa-save"></i> 保存修改
                    </button>
                    <button class="btn btn-primary" id="publish-btn" disabled>
                        <i class="fas fa-paper-plane"></i>
                        发布
                    </button>
                    <button class="btn btn-secondary" id="xhs-perfect-btn" disabled>
                        <i class="fab fa-xhs"></i>
                        小红书完善
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/publish-page.js"></script>
</body>

</html>
